default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks: [{id: conventional-pre-commit, stages: [commit-msg], args: [--verbose]}]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks: [{id: check-merge-conflict}, {id: end-of-file-fixer}, {id: trailing-whitespace}, {id: check-json}, {id: check-yaml}]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks: [{id: ruff, args: [--fix, --unsafe-fixes]}, {id: ruff-format}]
  - repo: https://github.com/phantomcyber/soar-app-linter
    rev: 0.1.0
    hooks: [{id: soar-app-linter, args: [--single-repo, --message-level, error]}]
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.165.0
    hooks: [{id: semgrep, additional_dependencies: [setuptools==81.0.0]}]
  - repo: https://github.com/phantomcyber/dev-cicd-tools
    rev: v2.2.4
    hooks:
      - id: build-docs
        language: python
        additional_dependencies: [local-hooks]
        args: ['.']
      - id: copyright
        language: python
        additional_dependencies: [local-hooks]
        args: ['.']
      - id: package-app-dependencies
        language: python
        additional_dependencies: [local-hooks]
      - id: notice-file
        language: python
        additional_dependencies: [local-hooks]
        args: ['.']
      - id: release-notes
        language: python
        additional_dependencies: [local-hooks]
        args: ['.']
      - id: static-tests
        language: python
        additional_dependencies: [local-hooks]
        args: ['.']
